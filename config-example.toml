# DarwinCode default config template
#
# 用法：
#   cd /home/xklab/01-darwin/dcode/70-darwin-code/darwin-rs
#   cargo run -p darwin-code-cli --bin darwin-code
#
# 说明：
# - 这是一个可解析的默认模板；未启用的配置项以注释形式列出，表示“保持程序默认值”。
# - 复制为 config.toml 后，从源码 checkout 内运行且未显式设置 DARWIN_CODE_HOME 时，会自动读取该文件。
# - 如需覆盖配置目录，可显式设置 DARWIN_CODE_HOME。
# - DarwinCode 产品默认是 BYOK：provider / model / base_url / api_key 由用户配置。
# - 本地未跟踪配置可以直接写 api_key；仓库模板/文档示例不要提交真实 key。

# =============================================================================
# 1. 默认 BYOK provider：DeepSeek v4（OpenAI-compatible）
# =============================================================================

model_provider = "deepseek"
model = "deepseek-v4-flash"
review_model = "deepseek-v4-pro"
model_catalog_json = "/home/xklab/01-darwin/dcode/70-darwin-code/model-catalog.deepseek.json"
model_reasoning_effort = "none"
approvals_reviewer = "user"

[openai_compatible.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com"
wire_api = "chat-completions"
# 本地 TUI 可以在 config.toml 中直接写明文 key；不要把真实 key 提交到仓库：
# api_key = "your-api-key"
api_key = "your-api-key"

[projects."/home/xklab/01-darwin/dcode/70-darwin-code"]
trust_level = "trusted"

# [openai]
# base_url = "https://api.openai.com/v1"
# api_key = "your-api-key"

# [openai_compatible.deepseek]
# name = "DeepSeek"
# base_url = "https://api.deepseek.com"
# wire_api = "chat-completions"
# api_key = "your-api-key"

# 通用 OpenAI-compatible 网关示例：公司网关、本地代理等都按标准 endpoint 处理。
# [openai_compatible.my-gateway]
# name = "My Gateway"
# base_url = "http://127.0.0.1:8080/v1"
# wire_api = "responses"
# api_key = "your-api-key"

# Gemini / Claude native 是目标协议族；当前 runtime adapter 未落地时，选择它们会明确报错。
# 临时使用 Gemini/Claude 的 OpenAI-compatible 网关时，请把 family 改成 "openai-compatible"。
# [gemini]
# base_url = "https://generativelanguage.googleapis.com/v1beta"
# api_key = "your-api-key"
#
# [claude]
# base_url = "https://api.anthropic.com"
# api_key = "your-api-key"

