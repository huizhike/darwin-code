# DarwinCode default config template
#
# Usage:
#   cd /home/xklab/01-darwin/dcode/70-darwin-code/darwin-rs
#   cargo run -p darwin-code-cli --bin darwin-code
#
# Notes:
# - This is a parseable example template. Commented settings keep runtime defaults.
# - Copy or rename this file to config.toml. When running from the source checkout
#   root without DARWIN_CODE_HOME, Darwin Code reads config.toml from that root.
# - Set DARWIN_CODE_HOME explicitly if you want a different config directory.
# - Darwin Code is BYOK by default: users configure provider, model, base_url,
#   and api_key explicitly.
# - Fill real api_key values only in config.toml. Do not commit real keys.

# =============================================================================
# 1. Active provider/model
# =============================================================================

# DeepSeek and Qwen are separate providers. Select the active provider/model here.
model_provider = "qwen"
model = "qwen3.6-plus"
approvals_reviewer = "user"
model_reasoning_effort = "none"

# =============================================================================
# 2. BYOK providers
# =============================================================================

[openai_compatible.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com"
wire_api = "chat-completions"
# For local TUI runs, write the real key in config.toml only. Do not commit it.
# api_key = "YOUR_DEEPSEEK_API_KEY"
api_key = "YOUR_DEEPSEEK_API_KEY"

[openai_compatible.deepseek.models."deepseek-v4-flash"]
display_name = "DeepSeek v4 Flash"
description = "DeepSeek OpenAI-compatible BYOK model."
context_window = 128000
max_output_tokens = 8192
temperature = 0.7
thinking = true
multimodal = true
tools = true

[openai_compatible.deepseek.models."deepseek-v4-pro"]
display_name = "DeepSeek v4 Pro"
description = "DeepSeek OpenAI-compatible BYOK model."
context_window = 128000
max_output_tokens = 8192
temperature = 0.7
thinking = true
multimodal = true
tools = true

[openai_compatible.qwen]
name = "Qwen"
base_url = "https://token-plan.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
wire_api = "chat-completions"
api_key = "YOUR_QWEN_API_KEY"

[openai_compatible.qwen.models."qwen3.6-plus"]
display_name = "Qwen 3.6 Plus"
description = "Qwen OpenAI-compatible BYOK model."
context_window = 128000
max_output_tokens = 8192
temperature = 0.7
thinking = true
multimodal = true
tools = true

[projects."/home/xklab/01-darwin/dcode/70-darwin-code"]
trust_level = "trusted"

