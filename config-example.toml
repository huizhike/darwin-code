# Generic OpenAI-compatible gateway example. Company gateways and local proxies
# should be configured as standard endpoints.
# [openai_compatible.my-gateway]
# name = "My Gateway"
# base_url = "http://127.0.0.1:8080/v1"
# wire_api = "responses"
# api_key = "YOUR_PROVIDER_API_KEY"

# Gemini and Claude native providers are target protocol families. If the runtime
# adapter is not implemented yet, selecting them should fail clearly. For a
# temporary Gemini/Claude OpenAI-compatible gateway, configure it under
# [openai_compatible.<id>] instead.
# [gemini]
# base_url = "https://generativelanguage.googleapis.com/v1beta"
# api_key = "YOUR_PROVIDER_API_KEY"
#
# [claude]
# base_url = "https://api.anthropic.com"
# api_key = "YOUR_PROVIDER_API_KEY"

